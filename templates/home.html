<!DOCTYPE html>
<html>
<head>
<title>AI Eye Disease Detection</title>

<style>
body{
    margin:0;
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    background: url('https://images.unsplash.com/photo-1628595351029-c2bf17511435?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Dark Overlay */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* Card */
.card{
    position:relative;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    padding:50px;
    border-radius:25px;
    text-align:center;
    color:white;
    width:90%;
    max-width:700px;
    box-shadow:0 25px 50px rgba(0,0,0,0.6);
}

button{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:12px;
    background:linear-gradient(to right,#00c6ff,#0072ff);
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h1>👁 Eye Disease Detection</h1>
    
    <h3>Swasti Gupta</h3>
    <h3>Nitya</h3>

    <a href="/upload">
        <button>Start Prediction</button>
    </a>
</div>

</body>
</html>
